version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: postgres-elearning
    environment:
      POSTGRES_USER: elearning
      POSTGRES_PASSWORD: elearning
      POSTGRES_DB: elearning_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: