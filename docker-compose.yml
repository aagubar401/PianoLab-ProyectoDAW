services:
  postgres:
    image: postgres:16
    container_name: postgres-elearning
    environment:
      POSTGRES_USER: elearning
      POSTGRES_PASSWORD: elearning
      POSTGRES_DB: elearning_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - piano-net
  
  backend:
    build: ./backend
    container_name: piano-backend
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: elearning
      DB_PASS: elearning
      DB_NAME: elearning_db
      PORT: 4000
    ports:
      - "4000:4000"
    networks:
      - piano-net

  frontend:
    build: ./frontend
    container_name: piano-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:4000
    ports:
      - "3000:3000"
    networks:
      - piano-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-elearning
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5052:80"
    depends_on:
      - postgres
    networks:
      - piano-net

volumes:
  pgdata:

networks:
  piano-net:
    driver: bridge
